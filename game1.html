<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>數字記憶配對</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  min-height: 100vh;
  background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
  font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 30px 20px;
}
.top-bar {
  width: 100%;
  max-width: 600px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}
.home-btn {
  background: rgba(255,255,255,0.9);
  color: #f5576c;
  border: none;
  padding: 12px 24px;
  border-radius: 30px;
  font-size: 1.1em;
  cursor: pointer;
  font-weight: bold;
  text-decoration: none;
  box-shadow: 0 4px 15px rgba(0,0,0,0.15);
  transition: transform 0.2s;
}
.home-btn:hover { transform: scale(1.05); }
.stats {
  display: flex;
  gap: 20px;
  color: #fff;
  font-size: 1.1em;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
}
.stats span { background: rgba(255,255,255,0.25); padding: 8px 16px; border-radius: 20px; }
h1 {
  color: #fff;
  font-size: 2.2em;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
  margin-bottom: 10px;
}
.board {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  max-width: 500px;
  width: 100%;
  margin-top: 10px;
}
.card {
  aspect-ratio: 1;
  border-radius: 16px;
  cursor: pointer;
  perspective: 600px;
  min-height: 80px;
}
.card-inner {
  position: relative;
  width: 100%;
  height: 100%;
  transition: transform 0.4s;
  transform-style: preserve-3d;
}
.card.flipped .card-inner { transform: rotateY(180deg); }
.card-face {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2em;
  font-weight: bold;
}
.card-front {
  background: #fff;
  color: #f5576c;
  font-size: 2.5em;
  box-shadow: 0 4px 15px rgba(0,0,0,0.15);
}
.card-back {
  background: linear-gradient(135deg, #a18cd1, #fbc2eb);
  transform: rotateY(180deg);
  box-shadow: 0 4px 15px rgba(0,0,0,0.15);
  font-size: 2.8em;
}
.card.matched .card-front {
  background: linear-gradient(135deg, #43e97b, #38f9d7);
  color: #fff;
}
.message {
  margin-top: 20px;
  font-size: 1.5em;
  color: #fff;
  text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
  min-height: 50px;
}
.restart-btn {
  margin-top: 15px;
  background: #fff;
  color: #f5576c;
  border: none;
  padding: 14px 36px;
  border-radius: 30px;
  font-size: 1.2em;
  cursor: pointer;
  font-weight: bold;
  box-shadow: 0 4px 15px rgba(0,0,0,0.15);
  transition: transform 0.2s;
  display: none;
}
.restart-btn:hover { transform: scale(1.05); }
#confettiCanvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 999;
}
</style>
</head>
<body>
<div class="top-bar">
  <a class="home-btn" href="index.html">🏠 回首頁</a>
  <div class="stats">
    <span>翻牌：<b id="moves">0</b> 次</span>
    <span>配對：<b id="pairs">0</b>/6</span>
  </div>
</div>

<h1>🔢 數字記憶配對</h1>
<p style="color:rgba(255,255,255,0.85); margin-bottom:8px;">翻開卡片，找出相同的數字！</p>

<canvas id="confettiCanvas"></canvas>
<div class="board" id="board"></div>
<div class="message" id="message"></div>
<button class="restart-btn" id="restartBtn" onclick="initGame()">🔄 再玩一次</button>

<script>
const EMOJIS = ['🌟','🌈','🦋','🍎','🎈','🌸'];
let cards = [], flipped = [], matched = 0, moves = 0, locked = false;

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playTone(freq, duration, type, vol) {
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type || 'sine';
  o.frequency.value = freq;
  g.gain.value = vol || 0.18;
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + duration);
}
function playFlip() { playTone(600, 0.1, 'sine', 0.12); }
function playCorrect() {
  playTone(523, 0.15, 'sine', 0.2);
  setTimeout(() => playTone(659, 0.15, 'sine', 0.2), 100);
  setTimeout(() => playTone(784, 0.25, 'sine', 0.2), 200);
}
function playWrong() { playTone(200, 0.25, 'sawtooth', 0.1); }
function playWin() {
  [523,587,659,698,784,880,988,1047].forEach((f,i) => {
    setTimeout(() => playTone(f, 0.2, 'sine', 0.18), i * 120);
  });
}

const canvas = document.getElementById('confettiCanvas');
const ctx = canvas.getContext('2d');
let particles = [];
function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resizeCanvas); resizeCanvas();

function spawnConfetti(x, y, count) {
  const colors = ['#f5576c','#43e97b','#38f9d7','#f1c40f','#9b59b6','#3498db','#e67e22','#fd79a8'];
  for (let i = 0; i < count; i++) {
    particles.push({
      x: x, y: y,
      vx: (Math.random() - 0.5) * 12,
      vy: (Math.random() - 0.5) * 12 - 4,
      w: Math.random() * 8 + 4,
      h: Math.random() * 6 + 3,
      color: colors[Math.floor(Math.random() * colors.length)],
      rot: Math.random() * 360,
      vr: (Math.random() - 0.5) * 15,
      life: 1
    });
  }
}

function spawnBurst(count) {
  const cx = window.innerWidth / 2, cy = window.innerHeight / 2;
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 * i) / count;
    const speed = 6 + Math.random() * 6;
    const colors = ['#f5576c','#43e97b','#38f9d7','#f1c40f','#9b59b6','#3498db','#e67e22','#fd79a8'];
    particles.push({
      x: cx, y: cy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      w: Math.random() * 10 + 5,
      h: Math.random() * 8 + 4,
      color: colors[Math.floor(Math.random() * colors.length)],
      rot: Math.random() * 360,
      vr: (Math.random() - 0.5) * 20,
      life: 1
    });
  }
}

function animateConfetti() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.3;
    p.rot += p.vr;
    p.life -= 0.012;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot * Math.PI / 180);
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
    ctx.restore();
  }
  if (particles.length > 0) requestAnimationFrame(animateConfetti);
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function initGame() {
  matched = 0; moves = 0; flipped = []; locked = false;
  document.getElementById('moves').textContent = '0';
  document.getElementById('pairs').textContent = '0';
  document.getElementById('message').textContent = '';
  document.getElementById('restartBtn').style.display = 'none';

  const nums = [];
  for (let i = 1; i <= 6; i++) { nums.push(i); nums.push(i); }
  shuffle(nums);

  const board = document.getElementById('board');
  board.innerHTML = '';
  nums.forEach((num, idx) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.num = num;
    card.dataset.idx = idx;
    card.innerHTML = `
      <div class="card-inner">
        <div class="card-face card-back">${EMOJIS[num - 1]}</div>
        <div class="card-face card-front">${num}</div>
      </div>`;
    card.addEventListener('click', () => flipCard(card));
    board.appendChild(card);
  });
  cards = document.querySelectorAll('.card');
}

function flipCard(card) {
  if (locked || card.classList.contains('flipped') || card.classList.contains('matched')) return;
  playFlip();
  card.classList.add('flipped');
  flipped.push(card);

  if (flipped.length === 2) {
    moves++;
    document.getElementById('moves').textContent = moves;
    locked = true;
    const [a, b] = flipped;
    if (a.dataset.num === b.dataset.num) {
      playCorrect();
      a.classList.add('matched');
      b.classList.add('matched');
      const rect = a.getBoundingClientRect();
      spawnConfetti(rect.left + rect.width / 2, rect.top + rect.height / 2, 30);
      if (particles.length <= 30) animateConfetti();
      matched++;
      document.getElementById('pairs').textContent = matched;
      flipped = [];
      locked = false;
      if (matched === 6) {
        playWin();
        spawnBurst(120);
        animateConfetti();
        document.getElementById('message').textContent = '🎉 太棒了！你成功配對了所有數字！';
        document.getElementById('restartBtn').style.display = 'inline-block';
      }
    } else {
      setTimeout(() => {
        playWrong();
        a.classList.remove('flipped');
        b.classList.remove('flipped');
        flipped = [];
        locked = false;
      }, 800);
    }
  }
}

initGame();
</script>
</body>
</html>
